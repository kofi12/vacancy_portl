services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vacancy_user
      POSTGRES_PASSWORD: vacancy_pass
      POSTGRES_DB: vacancy_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacancy_user -d vacancy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://vacancy_user:vacancy_pass@postgres:5432/vacancy_db
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx tsx src/index.ts"

volumes:
  postgres_data:
